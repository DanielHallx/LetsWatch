name: Feature Request
description: Suggest a feature, improvement, or compatibility enhancement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement for LetsWatch.

        Please keep the request focused on the user-facing behavior or compatibility need.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-check
      options:
        - label: I have searched existing issues and did not find a duplicate request.
          required: true
        - label: This request describes the desired behavior without exposing private implementation details.
          required: true

  - type: dropdown
    id: feature_type
    attributes:
      label: Feature type
      options:
        - Client compatibility
        - Emby API compatibility
        - Media browsing
        - Search
        - Playback
        - Metadata
        - User state
        - Performance
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Feature summary
      description: Briefly describe the feature or improvement.
      placeholder: "Add support for ..."
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why would this be useful?
      placeholder: "This would help because ..."
    validations:
      required: true

  - type: textarea
    id: behavior
    attributes:
      label: Desired behavior
      description: Describe what you would like LetsWatch to do.
      placeholder: "When the user/client does ..., LetsWatch should ..."
    validations:
      required: false

  - type: input
    id: related_client
    attributes:
      label: Related client or integration
      placeholder: "Example: Android client / iOS client / Web client / third-party integration"
    validations:
      required: false

  - type: input
    id: related_endpoint
    attributes:
      label: Related API endpoint
      description: Optional. Provide only if relevant.
      placeholder: "Example: GET /emby/..."
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: "Describe any workaround or alternative behavior."
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      placeholder: "Add examples, screenshots, or references."
    validations:
      required: false

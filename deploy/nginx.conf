worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
}

http {
    include       /etc/nginx/mime.types;
    types {
        video/x-matroska mkv;
    }
    default_type  application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log info;

    log_format letswatch_stream escape=json
        '{"time":"$time_iso8601",'
        '"request_id":"$request_id",'
        '"nginx_instance":"$hostname",'
        '"user_id":"$letswatch_user_id",'
        '"item_id":"$letswatch_item_id",'
        '"play_session_id":"$letswatch_play_session_id",'
        '"status":$status,'
        '"range":"$http_range",'
        '"bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"remote_addr":"$remote_addr",'
        '"user_agent":"$http_user_agent",'
        '"request_uri":"$uri"}';

    sendfile on;
    sendfile_max_chunk 1m;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 120s;
    keepalive_requests 1000;
    open_file_cache max=10000 inactive=30m;
    open_file_cache_valid 2m;
    open_file_cache_min_uses 1;
    open_file_cache_errors off;

    proxy_cache_path /var/cache/nginx/letswatch-images
        levels=1:2
        keys_zone=letswatch_image_cache:32m
        max_size=512m
        inactive=30d
        use_temp_path=off;

    proxy_cache_path /var/cache/nginx/letswatch-auth
        levels=1:2
        keys_zone=letswatch_auth_cache:8m
        max_size=64m
        inactive=1m
        use_temp_path=off;

    map $uri $letswatch_uri_item_id {
        default "";
        ~^/emby/Items/([^/]+)/Images/ $1;
        ~^/Items/([^/]+)/Images/ $1;
        ~^/emby/media/([^/]+)/ $1;
        ~^/media/([^/]+)/ $1;
    }

    map "$letswatch_uri_item_id:$arg_item_id" $letswatch_auth_item_id {
        default "";
        ~^([^:]+): $1;
        ~^:(.+)$ $1;
    }

    map $arg_stream_token $letswatch_auth_cache_bypass {
        default 0;
        "" 1;
    }

    upstream letswatch_api {
        server letswatch:8080;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 32m;

        location = /_letswatch_auth {
            internal;
            proxy_pass http://letswatch_api/internal/nginx/auth;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-LetsWatch-Item-Id $letswatch_auth_item_id;
            proxy_set_header X-LetsWatch-Token $arg_api_key;
            proxy_set_header X-LetsWatch-Stream-Token $arg_stream_token;
            proxy_set_header X-Emby-Token $http_x_emby_token;
            proxy_set_header X-MediaBrowser-Token $http_x_mediabrowser_token;
            proxy_set_header X-Emby-Authorization $http_x_emby_authorization;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;
            proxy_cache letswatch_auth_cache;
            proxy_cache_key "$request_uri|$letswatch_auth_item_id|$arg_stream_token";
            proxy_cache_valid 204 5s;
            proxy_cache_lock on;
            proxy_cache_bypass $letswatch_auth_cache_bypass;
            proxy_no_cache $letswatch_auth_cache_bypass;
        }

        location ~* ^/(emby/)?Items/[^/]+/Images/[^/]+ {
            proxy_pass http://letswatch_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_cache letswatch_image_cache;
            proxy_cache_key "$scheme$host$request_uri";
            proxy_cache_valid 200 30d;
            proxy_cache_lock on;
            proxy_cache_background_update on;

            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable" always;
            add_header X-LetsWatch-Cache $upstream_cache_status always;
        }

        location /emby/ {
            proxy_pass http://letswatch_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/(System|Users|Library|DisplayPreferences|Shows|Sessions|Search|Studios|Items)(/|$) {
            proxy_pass http://letswatch_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass http://letswatch_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /Items/ {
            proxy_pass http://letswatch_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /emby/media-file/ {
            auth_request /_letswatch_auth;
            auth_request_set $letswatch_user_id $upstream_http_x_letswatch_user_id;
            auth_request_set $letswatch_item_id $upstream_http_x_letswatch_item_id;
            auth_request_set $letswatch_play_session_id $upstream_http_x_letswatch_play_session_id;
            access_log /var/log/nginx/letswatch-stream-access.log letswatch_stream;
            alias /srv/library/;

            sendfile off;
            aio threads;
            output_buffers 2 512k;
            gzip off;
            add_header Cache-Control "private, no-transform" always;
            add_header Accept-Ranges bytes always;
        }

        location /media-file/ {
            auth_request /_letswatch_auth;
            auth_request_set $letswatch_user_id $upstream_http_x_letswatch_user_id;
            auth_request_set $letswatch_item_id $upstream_http_x_letswatch_item_id;
            auth_request_set $letswatch_play_session_id $upstream_http_x_letswatch_play_session_id;
            access_log /var/log/nginx/letswatch-stream-access.log letswatch_stream;
            alias /srv/library/;

            sendfile off;
            aio threads;
            output_buffers 2 512k;
            gzip off;
            add_header Cache-Control "private, no-transform" always;
            add_header Accept-Ranges bytes always;
        }
    }
}
